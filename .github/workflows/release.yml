name: Release unsigned artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
      DERIVED_DATA_PATH: /tmp/PomodoroughReleaseDerivedData
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17
      RELEASE_DIR: /tmp/PomodoroughRelease
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: >-
          xcodebuild
          -project Pomodorough.xcodeproj
          -scheme Pomodorough-iOS
          -derivedDataPath "$DERIVED_DATA_PATH"
          -resolvePackageDependencies

      - name: Test iOS
        run: >-
          xcodebuild
          -project Pomodorough.xcodeproj
          -scheme Pomodorough-iOS
          -destination "$IOS_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGNING_ALLOWED=NO
          test

      - name: Test macOS
        run: >-
          xcodebuild
          -project Pomodorough.xcodeproj
          -scheme Pomodorough-macOS
          -destination "platform=macOS"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGNING_ALLOWED=NO
          test

      - name: Build iOS simulator app without signing credentials
        run: >-
          xcodebuild
          -project Pomodorough.xcodeproj
          -scheme Pomodorough-iOS
          -configuration Release
          -destination "$IOS_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Build macOS app without signing credentials
        run: >-
          xcodebuild
          -project Pomodorough.xcodeproj
          -scheme Pomodorough-macOS
          -configuration Release
          -destination "generic/platform=macOS"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Package unsigned non-notarized apps
        shell: bash
        run: |
          set -euo pipefail

          ios_app="$DERIVED_DATA_PATH/Build/Products/Release-iphonesimulator/Pomodorough.app"
          macos_app="$DERIVED_DATA_PATH/Build/Products/Release/Pomodorough.app"
          ios_staged_app="$RUNNER_TEMP/Pomodorough-iOS-Simulator/Pomodorough.app"
          macos_staged_app="$RUNNER_TEMP/Pomodorough-macOS/Pomodorough.app"
          ios_zip="$RELEASE_DIR/Pomodorough-iOS-Simulator-unsigned-non-notarized-${GITHUB_REF_NAME}.zip"
          macos_zip="$RELEASE_DIR/Pomodorough-macOS-unsigned-non-notarized-${GITHUB_REF_NAME}.zip"

          test -d "$ios_app"
          test -d "$macos_app"
          mkdir -p "$(dirname "$ios_staged_app")" "$(dirname "$macos_staged_app")"
          ditto "$ios_app" "$ios_staged_app"
          ditto "$macos_app" "$macos_staged_app"
          codesign --remove-signature "$ios_staged_app"
          codesign --remove-signature "$macos_staged_app"

          if codesign -dv "$ios_staged_app" >/dev/null 2>&1; then
            printf 'iOS artifact is still signed\n' >&2
            exit 1
          fi
          if codesign -dv "$macos_staged_app" >/dev/null 2>&1; then
            printf 'macOS artifact is still signed\n' >&2
            exit 1
          fi

          mkdir -p "$RELEASE_DIR"
          ditto -c -k --sequesterRsrc --keepParent "$ios_staged_app" "$ios_zip"
          ditto -c -k --sequesterRsrc --keepParent "$macos_staged_app" "$macos_zip"

          cd "$RELEASE_DIR"
          shasum -a 256 ./*.zip > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' \
            'Unsigned, non-notarized developer artifacts built without signing credentials.' \
            '' \
            '- Linker-generated ad-hoc signatures were removed before packaging.' \
            '- iOS artifact: unsigned simulator build; it cannot be installed on a physical device.' \
            '- macOS artifact: unsigned and non-notarized; Gatekeeper may block normal launch.' \
            '- SHA256SUMS.txt contains SHA-256 checksums for both archives.' \
            > "$notes_file"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Pomodorough $GITHUB_REF_NAME unsigned artifacts" \
              --notes-file "$notes_file"
            gh release upload "$GITHUB_REF_NAME" "$RELEASE_DIR"/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$RELEASE_DIR"/* \
              --verify-tag \
              --title "Pomodorough $GITHUB_REF_NAME unsigned artifacts" \
              --notes-file "$notes_file"
          fi
