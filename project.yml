name: Pomodorough
options:
  bundleIdPrefix: me.egigoka
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: 9.2.0
schemes:
  Pomodorough-iOS:
    build:
      targets:
        Pomodorough-iOS: all
    test:
      targets:
        - PomodoroughTests
  Pomodorough-macOS:
    build:
      targets:
        Pomodorough-macOS: all
    test:
      targets:
        - PomodoroughMacTests
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    GOOGLE_CLIENT_ID: "614768274539-7pql3pdu31c8fctsp5ekdc3v2ej8isnr.apps.googleusercontent.com"
    GOOGLE_REVERSED_CLIENT_ID: "com.googleusercontent.apps.614768274539-7pql3pdu31c8fctsp5ekdc3v2ej8isnr"
targets:
  Pomodorough-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    info:
      path: Supporting/iOS-Info.plist
      properties:
        CFBundleDisplayName: Pomodorough
        GIDClientID: $(GOOGLE_CLIENT_ID)
        NSAlarmKitUsageDescription: Pomodorough schedules alarms so completed focus sessions and breaks alert you even when the app is not open.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.egigoka.pomodorough
        PRODUCT_NAME: Pomodorough
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: PTT6GCQ699
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  Pomodorough-macOS:
    type: application
    platform: macOS
    sources: [Sources]
    info:
      path: Supporting/macOS-Info.plist
      properties:
        CFBundleDisplayName: Pomodorough
        GIDClientID: $(GOOGLE_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.egigoka.pomodorough.mac
        PRODUCT_NAME: Pomodorough
        CODE_SIGN_ENTITLEMENTS: Pomodorough-macOS.entitlements
  PomodoroughTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: Pomodorough-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.egigoka.pomodorough.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Pomodorough.app/Pomodorough
        BUNDLE_LOADER: $(TEST_HOST)
  PomodoroughMacTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests]
    dependencies:
      - target: Pomodorough-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.egigoka.pomodorough.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Pomodorough.app/Contents/MacOS/Pomodorough
        BUNDLE_LOADER: $(TEST_HOST)
